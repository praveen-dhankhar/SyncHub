services:
  - type: web
    name: synchub-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MEDIASOUP_ANNOUNCED_ADDRESS
        sync: false
      - key: MEDIASOUP_LISTEN_IP
        value: 0.0.0.0
      - key: MEDIASOUP_RTC_MIN_PORT
        value: "10000"
      - key: MEDIASOUP_RTC_MAX_PORT
        value: "10100"
