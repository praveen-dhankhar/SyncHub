# ─── SyncHub — Docker Compose ─────────────────────────
# Run everything with:  docker compose up --build
#
# Services:
#   • client   → Next.js frontend (port 3000)
#   • backend  → Express + WebSocket + mediasoup (port 5001)
#
# Database: Neon PostgreSQL (cloud-hosted, no local DB needed)

services:
  # ── Backend API + WebSocket + mediasoup SFU ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synchub-backend
    ports:
      - "5001:5001"
      - "10000-10100:10000-10100/udp"
      - "10000-10100:10000-10100/tcp"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MEDIASOUP_ANNOUNCED_ADDRESS=${MEDIASOUP_ANNOUNCED_ADDRESS:-127.0.0.1}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:5001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - synchub

  # ── Frontend (Next.js) ──
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:5001
        NEXT_PUBLIC_WS_URL: ws://localhost:5001
    container_name: synchub-client
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synchub

networks:
  synchub:
    driver: bridge
